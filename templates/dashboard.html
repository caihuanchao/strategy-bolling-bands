<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布林带策略工作台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f7fa; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; position: relative; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { font-size: 16px; opacity: 0.9; }
        header .refresh-btn { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        header .refresh-btn:hover { background: rgba(255,255,255,0.3); }
        header .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .strategy-select { display: inline-block; margin-right: 12px; }
        .strategy-select select { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; outline: none; min-width: 160px; }
        .strategy-select select option { color: #333; background: white; }
        .strategy-select select option:disabled { color: #95a5a6; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; }
        .stat-value.buy { color: #e74c3c; }
        .stat-value.sell { color: #27ae60; }
        .stat-value.enhanced { color: #9b59b6; }
        .stat-label { color: #7f8c8d; margin-top: 5px; }
        h2 { margin: 30px 0 15px; color: #2c3e50; }
        .table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .table th { background: #34495e; color: white; padding: 15px; text-align: left; font-weight: 600; }
        .table td { padding: 12px 15px; border-bottom: 1px solid #ecf0f1; }
        .table tr:hover { background: #f8f9fa; cursor: pointer; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-buy { background: #fee2e2; color: #dc2626; }
        .badge-sell { background: #dcfce7; color: #16a34a; }
        .badge-enhanced { background: #f3e8ff; color: #7c3aed; }
        .badge-normal { background: #f1f5f9; color: #64748b; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 12px 24px; background: white; border-radius: 8px; cursor: pointer; border: none; font-size: 15px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        footer { text-align: center; margin-top: 50px; padding: 20px; color: #7f8c8d; font-size: 14px; }
        .empty { padding: 20px; color: #7f8c8d; text-align: center; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 12px; max-width: 900px; width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; border-radius: 12px 12px 0 0; }
        .modal-header h3 { font-size: 20px; color: #2c3e50; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #7f8c8d; padding: 4px 8px; border-radius: 4px; }
        .modal-close:hover { background: #f1f5f9; }
        .modal-body { padding: 24px; }
        .detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .detail-stat { background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center; }
        .detail-stat .val { font-size: 22px; font-weight: bold; color: #2c3e50; }
        .detail-stat .lbl { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
        .mini-chart { width: 100%; height: 300px; margin-top: 16px; }
        .loading-spinner { text-align: center; padding: 40px; color: #7f8c8d; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }

        /* Technical Indicator Interpretation */
        .interp-section { margin-top: 24px; }
        .interp-card { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
        .interp-card.interp-macd { border-left: 4px solid #1f77b4; }
        .interp-card.interp-bollinger { border-left: 4px solid #2ca02c; }
        .interp-card.interp-rsi { border-left: 4px solid #ff7f0e; }
        .interp-card h4 { font-size: 15px; font-weight: 600; color: #2c3e50; margin: 0 0 10px 0; }
        .interp-metrics { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .interp-metric { background: white; padding: 3px 10px; border-radius: 4px; font-size: 13px; border: 1px solid #e8e8e8; white-space: nowrap; }
        .interp-desc { font-size: 14px; line-height: 1.7; color: #444; margin-bottom: 6px; }
        .interp-desc strong { color: #2c3e50; }
        .interp-summary { font-size: 14px; font-weight: 600; color: #2c3e50; margin: 10px 0; padding: 10px 14px; background: rgba(102,126,234,0.08); border-radius: 6px; border-left: 3px solid #667eea; }
        .interp-checklist { margin: 8px 0 4px; padding-left: 20px; }
        .interp-checklist li { font-size: 13px; line-height: 1.6; color: #555; margin-bottom: 3px; }

        /* Parameter Lab */
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .preset-btn { background: white; border: 2px solid #e8e8e8; border-radius: 10px; padding: 14px; cursor: pointer; text-align: left; transition: all 0.2s; }
        .preset-btn:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.15); }
        .preset-btn.active { border-color: #667eea; border-left: 4px solid #667eea; background: rgba(102,126,234,0.04); }
        .preset-name { font-size: 15px; font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
        .preset-params { font-size: 13px; color: #667eea; font-weight: 600; margin-bottom: 4px; }
        .preset-desc { font-size: 12px; color: #95a5a6; line-height: 1.4; }
        .slider-group { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .slider-row { margin-bottom: 20px; }
        .slider-row:last-child { margin-bottom: 0; }
        .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; color: #2c3e50; }
        .slider-value { background: #667eea; color: white; padding: 2px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .slider-row input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: #e8e8e8; border-radius: 3px; outline: none; }
        .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #667eea; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 6px rgba(102,126,234,0.3); }
        .slider-range { display: flex; justify-content: space-between; font-size: 11px; color: #95a5a6; margin-top: 4px; }
        .diff-banner { padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-top: 12px; }
        .diff-banner.changed { background: #fef3c7; color: #92400e; }
        .diff-banner.unchanged { background: #f0fdf4; color: #166534; }
        /* 收口突破卡片 */
        .squeeze-card { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-bottom: 14px; border-left: 4px solid #95a5a6; }
        .squeeze-card.squeezing { border-left-color: #f59e0b; }
        .squeeze-card.breakout-up { border-left-color: #16a34a; }
        .squeeze-card.breakout-down { border-left-color: #dc2626; }
        .squeeze-card h4 { font-size: 15px; font-weight: 600; color: #2c3e50; margin: 0 0 10px 0; }
        .squeeze-metrics { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .squeeze-metric { background: white; padding: 3px 10px; border-radius: 4px; font-size: 13px; border: 1px solid #e8e8e8; white-space: nowrap; }
        .squeeze-badge { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
        .squeeze-badge.confirmed { background: #dcfce7; color: #166534; }
        .squeeze-badge.divergent { background: #fef2f2; color: #991b1b; }
        .squeeze-badge.neutral { background: #f0fdf4; color: #78716c; }
        .squeeze-badge.dir-up { background: #dcfce7; color: #166534; }
        .squeeze-badge.dir-down { background: #fef2f2; color: #991b1b; }
        .squeeze-timeline { margin-top: 10px; padding-left: 16px; border-left: 2px solid #e8e8e8; }
        .squeeze-timeline-item { position: relative; padding: 6px 0 6px 18px; font-size: 13px; color: #555; }
        .squeeze-timeline-item::before { content: ''; position: absolute; left: -22px; top: 10px; width: 8px; height: 8px; border-radius: 50%; background: #667eea; }
        .squeeze-timeline-item.breakout-up::before { background: #16a34a; }
        .squeeze-timeline-item.breakout-down::before { background: #dc2626; }
        .squeeze-empty { font-size: 13px; color: #95a5a6; margin-top: 8px; }
        .strategy-signal-bar { background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08)); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; border-left: 4px solid #667eea; }
        .strategy-signal-bar .signal-label { font-size: 13px; color: #667eea; font-weight: 600; }
        .strategy-signal-bar .signal-detail { font-size: 14px; color: #2c3e50; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="page-title">📊 布林带策略工作台</h1>
            <p id="header-meta">正在加载...</p>
            <div class="strategy-select">
                <select id="strategy-select" onchange="onStrategyChange()">
                    <option value="">加载中...</option>
                </select>
            </div>
            <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">🔄 刷新数据</button>
        </header>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card"><div class="stat-value buy" id="stat-buy">-</div><div class="stat-label">买入信号</div></div>
            <div class="stat-card"><div class="stat-value sell" id="stat-sell">-</div><div class="stat-label">卖出信号</div></div>
            <div class="stat-card"><div class="stat-value enhanced" id="stat-enhanced">-</div><div class="stat-label">增强信号 (&gt;1.5x 量)</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">扫描总数</div></div>
        </div>

        <!-- Error -->
        <div id="error-banner" class="error-msg" style="display:none"></div>

        <!-- Tab 切换 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('signals')">今日信号</button>
            <button class="tab" onclick="switchTab('all')">全部概览</button>
            <button class="tab" onclick="switchTab('params')">参数实验室</button>
        </div>

        <!-- Tab 1: 今日信号 -->
        <div id="tab-signals" class="tab-content active">
            <div class="loading-spinner" id="signals-loading">加载中...</div>
            <div id="signals-content"></div>
        </div>

        <!-- Tab 2: 全部概览 -->
        <div id="tab-all" class="tab-content">
            <div style="margin-bottom:16px">
                <input type="text" id="overview-search" placeholder="搜索代码或名称..." oninput="filterOverview()"
                    style="width:100%;max-width:360px;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;">
            </div>
            <div class="loading-spinner" id="overview-loading">加载中...</div>
            <div id="overview-content"></div>
        </div>

        <!-- Tab 3: 参数实验室 -->
        <div id="tab-params" class="tab-content">
            <div class="loading-spinner" id="paramlab-loading">加载中...</div>
            <div id="paramlab-content" style="display:none">
                <!-- A. 市场特征速览 -->
                <h2 style="margin:20px 0 12px;color:#2c3e50;">当前市场特征速览</h2>
                <div class="stats" id="snapshot-stats">
                    <div class="stat-card"><div class="stat-value" id="snap-bandwidth">-</div><div class="stat-label">平均带宽</div></div>
                    <div class="stat-card"><div class="stat-value" id="snap-std">-</div><div class="stat-label">平均标准差</div></div>
                    <div class="stat-card"><div class="stat-value" id="snap-trend">-</div><div class="stat-label">波动率趋势</div></div>
                </div>

                <!-- B. 预设模板 -->
                <h2 style="margin:24px 0 12px;color:#2c3e50;">参数预设</h2>
                <div class="preset-grid" id="preset-grid"></div>

                <!-- C. 手动滑块 -->
                <h2 style="margin:24px 0 12px;color:#2c3e50;">手动调节</h2>
                <div class="slider-group">
                    <div class="slider-row">
                        <div class="slider-label">
                            <span>N (周期)</span>
                            <span class="slider-value" id="n-value">20</span>
                        </div>
                        <input type="range" id="slider-n" min="5" max="50" step="1" value="20" oninput="onSliderChange()">
                        <div class="slider-range">5 — 50</div>
                    </div>
                    <div class="slider-row">
                        <div class="slider-label">
                            <span>M (倍数)</span>
                            <span class="slider-value" id="m-value">2.0</span>
                        </div>
                        <input type="range" id="slider-m" min="1.0" max="3.0" step="0.1" value="2.0" oninput="onSliderChange()">
                        <div class="slider-range">1.0 — 3.0</div>
                    </div>
                </div>

                <!-- D. 信号对比 -->
                <h2 style="margin:24px 0 12px;color:#2c3e50;">信号变化对比</h2>
                <div class="stats" id="comparison-stats">
                    <div class="stat-card"><div class="stat-value buy" id="comp-current-buy">-</div><div class="stat-label">当前买入</div></div>
                    <div class="stat-card"><div class="stat-value sell" id="comp-current-sell">-</div><div class="stat-label">当前卖出</div></div>
                    <div class="stat-card"><div class="stat-value buy" id="comp-preview-buy">-</div><div class="stat-label">新参数买入</div></div>
                    <div class="stat-card"><div class="stat-value sell" id="comp-preview-sell">-</div><div class="stat-label">新参数卖出</div></div>
                </div>
                <div id="diff-banner" style="display:none"></div>

                <!-- E. 应用按钮 -->
                <div style="margin-top:16px;text-align:center">
                    <button id="apply-btn" onclick="applyParams()" style="background:#667eea;color:white;border:none;padding:14px 48px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(102,126,234,0.3);transition:all 0.2s;">
                        应用参数
                    </button>
                    <p style="margin-top:8px;font-size:13px;color:#95a5a6;">点击后重新计算全量信号，其他标签页同步更新</p>
                </div>
            </div>
        </div>

        <footer><p>💡 提示：增强信号 = 有信号 + 成交量放大 > 1.5倍前20日均量</p></footer>
    </div>

    <!-- 股票详情 Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">股票详情</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="loading-spinner">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let signalsData = null;
        let stocksData = null;
        let currentStrategyId = 'bollinger';
        let strategiesList = [];

        const strategyLabels = {
            'bollinger': { buy: '买入信号 (触及下轨)', sell: '卖出信号 (触及上轨)', enhanced: '增强信号 (>1.5x 量)' },
            'dual_ma': { buy: '买入信号 (金叉)', sell: '卖出信号 (死叉)', enhanced: '增强信号 (>1.2x 量)' },
        };

        const posColors = {
            '上轨附近': '#27ae60', '下轨附近': '#e74c3c',
            '中上区间': '#3498db', '中下区间': '#95a5a6', '-': '#ccc'
        };

        async function fetchJSON(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }

        let pollTimer = null;
        let previewDebounceTimer = null;
        let presetData = [];
        let detailChartHistory = null;
        let detailChartClicked = null;

        async function initStrategySelect() {
            try {
                const data = await fetchJSON('/api/strategies');
                strategiesList = data.strategies || [];
                currentStrategyId = data.active || 'bollinger';
                const sel = document.getElementById('strategy-select');
                sel.innerHTML = strategiesList.map(s =>
                    '<option value="' + s.id + '"' + (s.id === currentStrategyId ? ' selected' : '') + '>' + s.name + '</option>'
                ).join('');
                updateStatLabels();
            } catch (e) {}
        }

        async function onStrategyChange() {
            const newId = document.getElementById('strategy-select').value;
            if (newId === currentStrategyId) return;
            try {
                const resp = await fetch('/api/strategy/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ strategy: newId })
                });
                const result = await resp.json();
                if (result.success) {
                    currentStrategyId = newId;
                    document.getElementById('page-title').textContent = '📊 ' + (strategiesList.find(s => s.id === newId) || {}).name + '策略工作台';
                    updateStatLabels();
                    pollTimer = setInterval(autoRefresh, 3000);
                }
            } catch (e) {}
        }

        function updateStatLabels() {
            const labels = strategyLabels[currentStrategyId] || strategyLabels['bollinger'];
            document.querySelector('.stat-card:nth-child(1) .stat-label').textContent = labels.buy;
            document.querySelector('.stat-card:nth-child(2) .stat-label').textContent = labels.sell;
            document.querySelector('.stat-card:nth-child(3) .stat-label').textContent = labels.enhanced;
            document.getElementById('page-title').textContent = '📊 ' + (strategiesList.find(s => s.id === currentStrategyId) || {name:'布林带'}).name + '策略工作台';
        }

        async function loadAll() {
            try {
                const [sigRes, stkRes] = await Promise.all([
                    fetchJSON('/api/signals'),
                    fetchJSON('/api/stocks')
                ]);
                signalsData = sigRes;
                stocksData = stkRes;
                updateStats(sigRes.meta);
                renderSignals(sigRes);
                renderOverview(stkRes);

                if (sigRes.meta.loading) {
                    document.getElementById('header-meta').textContent += ' | 🔄 正在刷新最新数据...';
                    pollTimer = setInterval(autoRefresh, 3000);
                }
            } catch (e) {
                document.getElementById('error-banner').style.display = 'block';
                document.getElementById('error-banner').textContent = '数据加载失败: ' + e.message;
            }
        }

        async function autoRefresh() {
            try {
                const sigRes = await fetchJSON('/api/signals');
                updateStats(sigRes.meta);
                if (!sigRes.meta.loading) {
                    clearInterval(pollTimer);
                    currentStrategyId = sigRes.meta.strategy_id || currentStrategyId;
                    const stkRes = await fetchJSON('/api/stocks');
                    signalsData = sigRes;
                    stocksData = stkRes;
                    renderSignals(sigRes);
                    renderOverview(stkRes);
                    updateStatLabels();
                    var applyBtn = document.getElementById('apply-btn');
                    if (applyBtn) { applyBtn.disabled = false; applyBtn.textContent = '应用参数'; }
                    if (document.getElementById('tab-params').classList.contains('active')) {
                        updateComparison();
                        loadParams();
                    }
                }
            } catch (e) {}
        }

        function updateStats(meta) {
            document.getElementById('stat-buy').textContent = meta.buy_count;
            document.getElementById('stat-sell').textContent = meta.sell_count;
            document.getElementById('stat-enhanced').textContent = meta.enhanced_count;
            document.getElementById('stat-total').textContent = meta.total_stocks;
            const time = meta.scan_time ? meta.scan_time.replace('T', ' ').substring(0, 19) : '-';
            document.getElementById('header-meta').textContent =
                `自选股: ${meta.total_stocks} 只 | 扫描时间: ${time}` +
                (meta.loading ? ' | 加载中...' : '');
        }

        function renderSignals(data) {
            const container = document.getElementById('signals-content');
            document.getElementById('signals-loading').style.display = 'none';

            const buySignals = data.buy_signals || [];
            const sellSignals = data.sell_signals || [];

            let html = '';
            html += '<h2>📈 买入信号 (' + buySignals.length + ')</h2>';
            html += renderSignalTable(buySignals, 'BUY');

            html += '<h2>📉 卖出信号 (' + sellSignals.length + ')</h2>';
            html += renderSignalTable(sellSignals, 'SELL');

            container.innerHTML = html;
        }

        function renderSignalTable(signals, type) {
            if (signals.length === 0) {
                return '<p class="empty">暂无' + (type === 'BUY' ? '买入' : '卖出') + '信号</p>';
            }
            // 从第一条 signal 获取列定义
            var displayFields = (signals[0].metadata && signals[0].metadata.display_fields) || [
                {key: 'price', label: '价格', format: 'price'},
                {key: 'volume_ratio', label: '量比', format: 'ratio'}
            ];
            // 固定前置列
            var headerCols = '<th>代码</th><th>名称</th><th>类型</th>';
            displayFields.forEach(function(f) { headerCols += '<th>' + f.label + '</th>'; });
            headerCols += '<th>日期</th>';

            let rows = signals.map(s => {
                const typeBadge = '<span class="badge badge-' + s.signal_type.toLowerCase() + '">' + s.signal_type + '</span>';
                const enhBadge = s.is_enhanced
                    ? '<span class="badge badge-enhanced">🟢 增强</span>'
                    : '<span class="badge badge-normal">⚪ 普通</span>';
                var rowHtml = '<tr onclick="showStockDetail(\'' + s.symbol + '\')">' +
                    '<td><strong>' + s.symbol + '</strong></td>' +
                    '<td>' + s.name + '</td>' +
                    '<td>' + typeBadge + ' ' + enhBadge + '</td>';

                displayFields.forEach(function(f) {
                    var val = _getFieldValue(s, f);
                    rowHtml += '<td>' + val + '</td>';
                });
                rowHtml += '<td>' + s.date + '</td></tr>';
                return rowHtml;
            }).join('');
            return '<table class="table"><thead><tr>' + headerCols + '</tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function _getFieldValue(signal, field) {
            var val = signal[field.key];
            if (val === null || val === undefined) val = (signal.metadata && signal.metadata[field.key]);
            if (val === null || val === undefined) return '-';
            var fmt = field.format || 'raw';
            if (fmt === 'price') return '¥' + Number(val).toFixed(2);
            if (fmt === 'ratio') return Number(val).toFixed(1) + 'x';
            return val;
        }

        let allStocks = [];

        function renderOverview(data) {
            document.getElementById('overview-loading').style.display = 'none';
            allStocks = data.stocks || [];
            document.getElementById('overview-search').value = '';
            doRenderOverview(allStocks);
        }

        function filterOverview() {
            const query = document.getElementById('overview-search').value.trim().toLowerCase();
            const filtered = query
                ? allStocks.filter(s => s.symbol.includes(query) || s.name.toLowerCase().includes(query))
                : allStocks;
            doRenderOverview(filtered);
        }

        function doRenderOverview(stocks) {
            const container = document.getElementById('overview-content');
            if (stocks.length === 0) {
                container.innerHTML = '<p class="empty">暂无匹配结果</p>';
                return;
            }

            var isDualMA = currentStrategyId === 'dual_ma';
            var headerHtml = '<tr><th>代码</th><th>名称</th><th>现价</th>';
            if (isDualMA) {
                headerHtml += '<th>快线(EMA)</th><th>慢线(EMA)</th><th>趋势</th>';
            } else {
                headerHtml += '<th>中轨</th><th>上轨</th><th>下轨</th><th>位置</th>';
            }
            headerHtml += '<th>信号</th></tr>';

            let rows = stocks.map(s => {
                const signalBadge = s.has_signal === 'BUY'
                    ? '<span class="badge badge-buy">买入</span>'
                    : s.has_signal === 'SELL'
                        ? '<span class="badge badge-sell">卖出</span>'
                        : '';
                var rowHtml = '<tr onclick="showStockDetail(\'' + s.symbol + '\')">' +
                    '<td><strong>' + s.symbol + '</strong></td>' +
                    '<td>' + s.name + '</td>' +
                    '<td>¥' + s.close.toFixed(2) + '</td>';
                if (isDualMA) {
                    var ef = s.ema_fast ? s.ema_fast.toFixed(2) : '-';
                    var es = s.ema_slow ? s.ema_slow.toFixed(2) : '-';
                    var trend = s.trend || '-';
                    var trendColor = trend.includes('多头') ? '#16a34a' : trend.includes('空头') ? '#dc2626' : '#333';
                    rowHtml += '<td>¥' + ef + '</td><td>¥' + es + '</td><td style="color:' + trendColor + ';font-weight:600">' + trend + '</td>';
                } else {
                    const color = posColors[s.position] || '#ccc';
                    rowHtml += '<td>¥' + s.boll_mid.toFixed(2) + '</td><td>¥' + s.boll_up.toFixed(2) + '</td><td>¥' + s.boll_down.toFixed(2) + '</td><td style="color:' + color + '">📌 ' + s.position + '</td>';
                }
                rowHtml += '<td>' + signalBadge + '</td></tr>';
                return rowHtml;
            }).join('');

            container.innerHTML = '<h2>📋 全部股票状态</h2><table class="table"><thead>' + headerHtml + '</thead><tbody>' + rows + '</tbody></table>';
        }

        async function showStockDetail(symbol) {

            const body = document.getElementById('modal-body');

            body.innerHTML = '<div class="loading-spinner">加载中...</div>';

            try {
                const data = await fetchJSON('/api/stock/' + symbol);
                document.getElementById('modal-title').textContent = data.name + ' (' + data.symbol + ')';

                const l = data.latest;
                var isDualMA = data.strategy_id === 'dual_ma';

                if (l.boll_up && l.boll_down && l.boll_up > l.boll_down) {

                    else if (l.close <= l.boll_down) pos = '下轨附近';

                }

                // 策略信号状态条
                var strategyName = (strategiesList.find(function(s) { return s.id === currentStrategyId; }) || {}).name || '布林带触碰';
                var sigLabel = '';

                else if (l.sell_signal) sigLabel = '卖出';

                if (isDualMA) {

                    }
                } else {

                var sigColor = l.buy_signal ? '#16a34a' : l.sell_signal ? '#dc2626' : '#95a5a6';

                    '<div class="signal-detail">' + sigDesc + '</div>' +
                    '</div>';

                // 详情统计卡片
                html += '<div class="detail-stats">' +
                    '<div class="detail-stat"><div class="val">¥' + l.close.toFixed(2) + '</div><div class="lbl">最新价</div></div>';

                if (isDualMA) {
                    var latestRow = histArr.length > 0 ? histArr[histArr.length - 1] : {};
                    var ef = latestRow.ema_fast ? latestRow.ema_fast.toFixed(2) : '-';

                        '<div class="detail-stat"><div class="val">¥' + es + '</div><div class="lbl">慢线(EMA)</div></div>' +
                        '<div class="detail-stat"><div class="val" style="color:' + trendClr + '">' + trendTxt + '</div><div class="lbl">趋势方向</div></div>';
                } else {
                    html += '<div class="detail-stat"><div class="val">¥' + (l.boll_up ? l.boll_up.toFixed(2) : '-') + '</div><div class="lbl">布林上轨</div></div>' +
                        '<div class="detail-stat"><div class="val">¥' + (l.boll_mid ? l.boll_mid.toFixed(2) : '-') + '</div><div class="lbl">布林中轨</div></div>' +
                        '<div class="detail-stat"><div class="val">¥' + (l.boll_down ? l.boll_down.toFixed(2) : '-') + '</div><div class="lbl">布林下轨</div></div>' +

                // MACD + RSI 指标卡片 + 解读

                    else if (l.rsi <= 30) { rsiColor = '#16a34a'; rsiLabel = '超卖 ⚡'; rsiTip = 'RSI≤30：超卖区域，短期可能反弹，关注买入机会'; }
                    else if (l.rsi >= 50) { rsiColor = '#e74c3c'; rsiLabel = '偏强'; rsiTip = '50<RSI<70：多方占优，趋势偏强'; }
                    else { rsiColor = '#27ae60'; rsiLabel = '偏弱'; rsiTip = '30<RSI<50：空方占优，趋势偏弱'; }

                let macdTrendLabel = '', macdTrendColor = '#333', macdTrendTip = '';
                if (l.macd != null && l.macd_signal != null) {
                    if (l.macd > l.macd_signal) { macdTrendLabel = '金叉 ↗'; macdTrendColor = '#16a34a'; macdTrendTip = 'MACD上穿信号线：看涨信号，短期趋势向上'; }
                    else { macdTrendLabel = '死叉 ↘'; macdTrendColor = '#dc2626'; macdTrendTip = 'MACD下穿信号线：看跌信号，短期趋势向下'; }

                    '<div class="detail-stat" title="' + macdTrendTip + '"><div class="val" style="font-size:16px">' + (l.macd != null ? l.macd.toFixed(3) : '-') + '</div><div class="lbl">MACD <span style="color:' + macdTrendColor + ';font-weight:600">' + macdTrendLabel + '</span></div></div>' +
                    '<div class="detail-stat" title="' + macdTrendTip + '"><div class="val" style="font-size:16px">' + (l.macd_signal != null ? l.macd_signal.toFixed(3) : '-') + '</div><div class="lbl">信号线</div></div>' +
                    '<div class="detail-stat" title="' + barTip + '"><div class="val" style="font-size:16px;color:' + barColor + '">' + (l.macd_histogram != null ? l.macd_histogram.toFixed(3) : '-') + '</div><div class="lbl">MACD柱 <span style="color:' + barColor + ';font-weight:600">' + barLabel + '</span></div></div>' +
                    '<div class="detail-stat" title="' + rsiTip + '"><div class="val" style="font-size:18px;color:' + rsiColor + '">' + (l.rsi != null ? l.rsi.toFixed(1) : '-') + '</div><div class="lbl">RSI <span style="color:' + rsiColor + ';font-weight:600">' + rsiLabel + '</span></div></div>' +

                // 双面板图表 (价格+布林带 / MACD)

                // 收口突破卡片（仅布林带策略）

                if (histArr.length > 0) {

            } catch (e) {
                body.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';

        function drawMiniChart(canvasId, history) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            detailChartHistory = history;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = 400 * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = '400px';
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = 400;
            const pad = { top: 20, right: 20, bottom: 40, left: 60 };
            const pw = w - pad.left - pad.right;
            // 上下面板分隔：上65% 价格，下35% MACD
            const priceH = (h - pad.top - pad.bottom) * 0.62;
            const macdH = (h - pad.top - pad.bottom) * 0.38;
            const separatorY = pad.top + priceH;

            const closes = history.map(d => d.close);
            const maMids = history.map(d => d.ma_mid || null);
            const bollUps = history.map(d => d.boll_up || null);
            const bollDowns = history.map(d => d.boll_down || null);
            const emaFasts = history.map(d => d.ema_fast || null);
            const emaSlows = history.map(d => d.ema_slow || null);

            const allVals = [...closes, ...maMids.filter(v => v), ...bollUps.filter(v => v), ...bollDowns.filter(v => v),
                            ...emaFasts.filter(v => v), ...emaSlows.filter(v => v)];
            const minVal = Math.min(...allVals);
            const maxVal = Math.max(...allVals);
            const range = maxVal - minVal || 1;

            const xScale = i => pad.left + (i / (history.length - 1)) * pw;
            const yScale = v => pad.top + priceH - ((v - minVal) / range) * priceH;

            // 布林带填充 / EMA 线
            var isDualMAChart = currentStrategyId === 'dual_ma';
            if (!isDualMAChart) {
                ctx.fillStyle = 'rgba(128,128,128,0.08)';
                ctx.beginPath();
                for (let i = 0; i < history.length; i++) {
                    if (bollUps[i] == null) continue;
                    const x = xScale(i);
                    ctx.lineTo(x, yScale(bollUps[i]));
                }
                for (let i = history.length - 1; i >= 0; i--) {
                    if (bollDowns[i] == null) continue;
                    const x = xScale(i);
                    ctx.lineTo(x, yScale(bollDowns[i]));
                }
                ctx.closePath();
                ctx.fill();
            }

            // 网格
            ctx.strokeStyle = '#ecf0f1';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (priceH / 4) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
                ctx.fillStyle = '#95a5a6';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                const val = maxVal - (range / 4) * i;
                ctx.fillText(val.toFixed(2), pad.left - 6, y + 4);
            }

            if (isDualMAChart) {
                // EMA 快线
                ctx.strokeStyle = '#ff7f0e';
                ctx.lineWidth = 2;
                ctx.setLineDash([]);
                ctx.beginPath();
                let efs = false;
                for (let i = 0; i < history.length; i++) {
                    if (emaFasts[i] == null) continue;
                    if (!efs) { ctx.moveTo(xScale(i), yScale(emaFasts[i])); efs = true; }
                    else ctx.lineTo(xScale(i), yScale(emaFasts[i]));
                }
                ctx.stroke();
                // EMA 慢线
                ctx.strokeStyle = '#2ca02c';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 2]);
                ctx.beginPath();
                let ess = false;
                for (let i = 0; i < history.length; i++) {
                    if (emaSlows[i] == null) continue;
                    if (!ess) { ctx.moveTo(xScale(i), yScale(emaSlows[i])); ess = true; }
                    else ctx.lineTo(xScale(i), yScale(emaSlows[i]));
                }
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                // 均线
                ctx.strokeStyle = '#ff7f0e';
                ctx.setLineDash([4, 2]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                let started = false;
                for (let i = 0; i < history.length; i++) {
                    if (maMids[i] == null) continue;
                    if (!started) { ctx.moveTo(xScale(i), yScale(maMids[i])); started = true; }
                    else ctx.lineTo(xScale(i), yScale(maMids[i]));
                }
                ctx.stroke();
                ctx.setLineDash([]);

                // 上轨
                ctx.strokeStyle = '#2ca02c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                started = false;
                for (let i = 0; i < history.length; i++) {
                    if (bollUps[i] == null) continue;
                    if (!started) { ctx.moveTo(xScale(i), yScale(bollUps[i])); started = true; }
                    else ctx.lineTo(xScale(i), yScale(bollUps[i]));
                }
                ctx.stroke();

                // 下轨
                ctx.strokeStyle = '#d62728';
                ctx.lineWidth = 1;
                ctx.beginPath();
                started = false;
                for (let i = 0; i < history.length; i++) {
                    if (bollDowns[i] == null) continue;
                    if (!started) { ctx.moveTo(xScale(i), yScale(bollDowns[i])); started = true; }
                    else ctx.lineTo(xScale(i), yScale(bollDowns[i]));
                }
                ctx.stroke();
            }

            // 收盘价线
            ctx.strokeStyle = '#1f77b4';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(xScale(0), yScale(closes[0]));
            for (let i = 1; i < history.length; i++) {
                ctx.lineTo(xScale(i), yScale(closes[i]));
            }
            ctx.stroke();

            // 买入/卖出信号点
            for (let i = 0; i < history.length; i++) {
                const x = xScale(i);
                if (history[i].buy_signal) {
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(x, yScale(closes[i]), 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (history[i].sell_signal) {
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.arc(x, yScale(closes[i]) - 8, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ─── MACD 面板 ────────────────────────────────────
            const macdTop = separatorY + 5;
            const macdBot = h - pad.bottom;
            const macdMid = macdTop + macdH / 2;

            const macdVals = history.map(d => d.macd_histogram != null ? d.macd_histogram : null).filter(v => v !== null);
            const sigVals = history.map(d => d.macd_signal != null ? d.macd_signal : null).filter(v => v !== null);
            if (macdVals.length > 0) {
                // 分隔线
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(pad.left, separatorY);
                ctx.lineTo(w - pad.right, separatorY);
                ctx.stroke();

                const macdMin = Math.min(0, ...macdVals, ...sigVals);
                const macdMax = Math.max(0, ...macdVals, ...sigVals);
                const macdRange = (macdMax - macdMin) || 1;
                const macdY = v => macdTop + macdH - ((v - macdMin) / macdRange) * macdH;
                const barW = Math.max(1, pw / history.length * 0.6);

                // 零线
                const zeroY = macdY(0);
                ctx.strokeStyle = '#999';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(pad.left, zeroY);
                ctx.lineTo(w - pad.right, zeroY);
                ctx.stroke();

                // MACD 柱状图
                for (let i = 0; i < history.length; i++) {
                    const hv = history[i].macd_histogram;
                    if (hv == null) continue;
                    const x = xScale(i);
                    const barH = Math.abs(macdY(hv) - zeroY);
                    ctx.fillStyle = hv >= 0 ? '#dc2626' : '#16a34a';
                    ctx.fillRect(x - barW / 2, hv >= 0 ? zeroY - barH : zeroY, barW, Math.max(1, barH));
                }

                // MACD 信号线
                ctx.strokeStyle = '#1f77b4';
                ctx.lineWidth = 1;
                ctx.beginPath();
                let sStarted = false;
                for (let i = 0; i < history.length; i++) {
                    const sv = history[i].macd_signal;
                    if (sv == null) continue;
                    if (!sStarted) { ctx.moveTo(xScale(i), macdY(sv)); sStarted = true; }
                    else ctx.lineTo(xScale(i), macdY(sv));
                }
                ctx.stroke();

                // MACD Y轴标签
                ctx.fillStyle = '#95a5a6';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(macdMax.toFixed(2), pad.left - 6, macdTop + 12);
                ctx.fillText(macdMin.toFixed(2), pad.left - 6, macdBot - 2);
            }

            // x 轴日期标签
            ctx.fillStyle = '#95a5a6';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const labelCount = Math.min(6, history.length);
            for (let i = 0; i < labelCount; i++) {
                const idx = Math.round((i / (labelCount - 1 || 1)) * (history.length - 1));
                const x = xScale(idx);
                const ds = history[idx].date || '';
                ctx.fillText(ds, x, h - pad.bottom + 15);
            }

            // 点击交互：十字线 + tooltip
            if (detailChartClicked !== null && detailChartClicked < history.length) {
                const ci = detailChartClicked;
                const cx = xScale(ci);
                const pt = history[ci];

                // 垂直十字线
                ctx.strokeStyle = 'rgba(102,126,234,0.5)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(cx, pad.top);
                ctx.lineTo(cx, h - pad.bottom);
                ctx.stroke();
                ctx.setLineDash([]);

                // 水平价格线
                if (pt.close != null) {
                    const cy = yScale(pt.close);
                    ctx.beginPath();
                    ctx.moveTo(pad.left, cy);
                    ctx.lineTo(w - pad.right, cy);
                    ctx.stroke();

                    // 数据点圆点
                    ctx.fillStyle = '#667eea';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // tooltip 背景框
                const isRight = cx < w / 2;
                const tx = isRight ? cx + 14 : cx - 14;
                const ttW = 170, ttH = 86;
                const ty = pad.top + 10;
                const bx = isRight ? tx : tx - ttW;

                ctx.fillStyle = 'rgba(44,62,80,0.92)';
                ctx.beginPath();
                ctx.roundRect(bx, ty, ttW, ttH, 6);
                ctx.fill();

                // tooltip 文字
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = isRight ? 'left' : 'right';
                const txtX = isRight ? bx + 10 : bx + ttW - 10;
                ctx.fillText(pt.date || '', txtX, ty + 20);

                ctx.font = '11px sans-serif';
                const ohlcv = [
                    '开 ' + (pt.open != null ? pt.open.toFixed(2) : '-'),
                    '高 ' + (pt.high != null ? pt.high.toFixed(2) : '-'),
                    '低 ' + (pt.low != null ? pt.low.toFixed(2) : '-'),
                    '收 ' + (pt.close != null ? pt.close.toFixed(2) : '-'),
                    '量 ' + (pt.volume != null ? (pt.volume / 10000).toFixed(1) + '万' : '-')
                ];
                ohlcv.forEach(function(t, j) {
                    ctx.fillText(t, txtX, ty + 38 + j * 16);
                });
            }

            // 点击事件：查找最近数据点并显示 tooltip
            canvas.onclick = function(e) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                // 只在价格面板区域响应
                if (my < pad.top || my > pad.top + priceH) {
                    detailChartClicked = null;
                    drawMiniChart(canvasId, history);
                    return;
                }
                // 找最近的 x 索引
                let nearestIdx = 0, nearestDist = Infinity;
                for (let i = 0; i < history.length; i++) {
                    const dx = Math.abs(xScale(i) - mx);
                    if (dx < nearestDist) { nearestDist = dx; nearestIdx = i; }
                }
                // toggle: 再次点击同一位置取消
                if (detailChartClicked === nearestIdx) {
                    detailChartClicked = null;
                } else {
                    detailChartClicked = nearestIdx;
                }
                drawMiniChart(canvasId, history);
            };
        }

        function renderSqueezeCard(sq) {
            if (!sq || sq.is_squeeze === undefined) return '';

            var bwPct = (sq.bandwidth_pct * 100).toFixed(1);
            var isSqueeze = sq.is_squeeze;
            var direction = sq.breakout_direction;
            var cross = sq.cross_validation || 'neutral';

            // 确定卡片样式
            var cardClass = 'squeeze-card';
            if (direction === 'up') cardClass += ' breakout-up';
            else if (direction === 'down') cardClass += ' breakout-down';
            else if (isSqueeze) cardClass += ' squeezing';

            // 方向标签
            var dirLabel = '';
            if (direction === 'up') dirLabel = '<span class="squeeze-badge dir-up">向上突破 &#9650;</span>';
            else if (direction === 'down') dirLabel = '<span class="squeeze-badge dir-down">向下突破 &#9660;</span>';

            // 收口状态标签
            var squeezeLabel = isSqueeze
                ? '<span class="squeeze-metric" style="color:#f59e0b;font-weight:600">收口中</span>'
                : '<span class="squeeze-metric">带宽正常</span>';

            // 交叉验证标签
            var crossLabel = '';
            if (direction) {
                if (cross === 'confirmed') crossLabel = '<span class="squeeze-badge confirmed">与信号共振 &#10003;</span>';
                else if (cross === 'divergent') crossLabel = '<span class="squeeze-badge divergent">与信号背离 &#10007;</span>';
                else crossLabel = '<span class="squeeze-badge neutral">无现有信号</span>';
            }

            var html = '<div class="' + cardClass + '">';
            html += '<h4>布林带收口突破</h4>';
            html += '<div class="squeeze-metrics">';
            html += '<span class="squeeze-metric"><strong>带宽:</strong> ' + bwPct + '%</span>';
            html += squeezeLabel;
            if (dirLabel) html += dirLabel;
            if (crossLabel) html += crossLabel;
            html += '</div>';

            // 历史事件时间线
            var history = sq.history || [];
            if (history.length > 0) {
                html += '<div class="squeeze-timeline">';
                var showCount = Math.min(history.length, 5);
                for (var i = 0; i < showCount; i++) {
                    var evt = history[i];
                    var evtClass = 'squeeze-timeline-item';
                    if (evt.direction === 'up') evtClass += ' breakout-up';
                    else if (evt.direction === 'down') evtClass += ' breakout-down';
                    var dirText = evt.direction === 'up' ? '向上突破' : '向下突破';
                    html += '<div class="' + evtClass + '">';
                    html += '<strong>' + evt.date + '</strong> ' + dirText;
                    html += ' <span style="color:#95a5a6">量比 ' + (evt.volume_ratio || 0).toFixed(1) + 'x</span>';
                    html += ' <span style="color:#95a5a6">带宽 ' + (evt.bandwidth_pct * 100).toFixed(1) + '%</span>';
                    html += '</div>';
                }
                html += '</div>';
            } else {
                html += '<div class="squeeze-empty">暂无历史突破事件</div>';
            }

            html += '</div>';
            return html;
        }

        // ─── 参数实验室 ──────────────────────────────────────────

        let currentParamsSchema = [];

        async function loadParams() {
            try {
                const data = await fetchJSON('/api/params');
                presetData = data.presets || [];
                currentParamsSchema = data.params_schema || [];
                if (data.loading) {
                    document.getElementById('paramlab-loading').style.display = 'block';
                    document.getElementById('paramlab-content').style.display = 'none';
                } else {
                    document.getElementById('paramlab-loading').style.display = 'none';
                    document.getElementById('paramlab-content').style.display = 'block';
                }
                renderMarketSnapshot(data.market_snapshot);
                // 动态渲染滑块区域
                var sliderGroup = document.querySelector('#tab-params .slider-group');
                if (sliderGroup) sliderGroup.innerHTML = renderSliders(currentParamsSchema, data.current_params);
                renderPresets(data.presets, data.current_params);
                if (!data.loading) updateSliderLabels();
                updateComparison();
            } catch (e) {}
        }

        function renderSliders(schema, values) {
            if (!schema || schema.length === 0) return '<p>无参数可调</p>';
            var html = '';
            schema.forEach(function(p) {
                var val = values[p.key] !== undefined ? values[p.key] : p.default;
                var step = p.step || 1;
                var isFloat = step < 1;
                html += '<div class="slider-row">' +
                    '<div class="slider-label">' +
                        '<span>' + p.label + '</span>' +
                        '<span class="slider-value" id="sv-' + p.key + '">' + (isFloat ? parseFloat(val).toFixed(1) : val) + '</span>' +
                    '</div>' +
                    '<input type="range" id="slider-' + p.key + '" min="' + p.min + '" max="' + p.max + '" step="' + step + '" value="' + val + '" oninput="onSliderChange()">' +
                    '<div class="slider-range">' + p.min + ' — ' + p.max + '</div>' +
                '</div>';
            });
            return html;
        }

        function getSliderParams() {
            var params = {};
            currentParamsSchema.forEach(function(p) {
                var el = document.getElementById('slider-' + p.key);
                if (!el) return;
                var step = p.step || 1;
                params[p.key] = step < 1 ? parseFloat(el.value) : parseInt(el.value);
            });
            return params;
        }

        function renderMarketSnapshot(snapshot) {
            if (!snapshot) return;
            document.getElementById('snap-bandwidth').textContent = snapshot.avg_bandwidth ? (snapshot.avg_bandwidth * 100).toFixed(1) + '%' : '-';
            document.getElementById('snap-std').textContent = snapshot.avg_std ? snapshot.avg_std.toFixed(3) : '-';
            var trend = snapshot.volatility_trend || '-';
            var trendEl = document.getElementById('snap-trend');
            trendEl.textContent = trend;
            trendEl.style.color = trend.includes('上升') ? '#dc2626' : trend.includes('下降') ? '#16a34a' : '#333';
        }

        function renderPresets(presets, currentParams) {
            if (!presets) return;
            var html = '';
            presets.forEach(function(p) {
                var pparams = p.params || p;
                var isActive = true;
                if (currentParams) {
                    for (var k in pparams) {
                        if (pparams[k] != currentParams[k]) { isActive = false; break; }
                    }
                }
                var paramsText = '';
                var keys = Object.keys(pparams);
                keys.forEach(function(k) {
                    var val = pparams[k];
                    paramsText += (paramsText ? '  ' : '') + k + '=' + (Number.isInteger(val) ? val : val.toFixed(1));
                });
                html += '<div class="preset-btn' + (isActive ? ' active' : '') + '" onclick="selectPreset(\'' + p.id + '\')" data-preset-id="' + p.id + '">' +
                    '<div class="preset-name">' + p.label + '</div>' +
                    '<div class="preset-params">' + paramsText + '</div>' +
                    '<div class="preset-desc">' + p.desc + '</div>' +
                    '</div>';
            });
            document.getElementById('preset-grid').innerHTML = html;
        }

        function selectPreset(id) {
            var preset = presetData.find(function(p) { return p.id === id; });
            if (!preset) return;
            var pparams = preset.params || preset;
            // 设置滑块值
            for (var k in pparams) {
                var el = document.getElementById('slider-' + k);
                if (el) el.value = pparams[k];
            }
            updateSliderLabels();
            var btns = document.querySelectorAll('#preset-grid .preset-btn');
            btns.forEach(function(b) { b.classList.remove('active'); });
            var target = document.querySelector('#preset-grid .preset-btn[data-preset-id="' + id + '"]');
            if (target) target.classList.add('active');
            debouncedPreview();
        }

        function updateSliderLabels() {
            currentParamsSchema.forEach(function(p) {
                var el = document.getElementById('slider-' + p.key);
                var label = document.getElementById('sv-' + p.key);
                if (!el || !label) return;
                var step = p.step || 1;
                label.textContent = step < 1 ? parseFloat(el.value).toFixed(1) : el.value;
            });
        }

        function onSliderChange() {
            updateSliderLabels();
            var btns = document.querySelectorAll('#preset-grid .preset-btn');
            btns.forEach(function(b) { b.classList.remove('active'); });
            debouncedPreview();
        }

        function debouncedPreview() {
            clearTimeout(previewDebounceTimer);
            previewDebounceTimer = setTimeout(function() { triggerPreview(); }, 300);
        }

        async function triggerPreview() {
            try {
                var params = getSliderParams();
                var resp = await fetch('/api/params/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
                var data = await resp.json();
                if (!data.error) {
                    renderComparison(data.current, data.preview);
                }
            } catch (e) {}
        }

        function renderComparison(current, preview) {
            document.getElementById('comp-current-buy').textContent = current ? current.buy : '-';
            document.getElementById('comp-current-sell').textContent = current ? current.sell : '-';
            document.getElementById('comp-preview-buy').textContent = preview ? preview.buy : '-';
            document.getElementById('comp-preview-sell').textContent = preview ? preview.sell : '-';

            var banner = document.getElementById('diff-banner');
            if (!current || !preview) {
                banner.style.display = 'none';
                return;
            }
            var buyDiff = preview.buy - current.buy;
            var sellDiff = preview.sell - current.sell;
            banner.style.display = 'block';
            if (buyDiff === 0 && sellDiff === 0) {
                banner.className = 'diff-banner unchanged';
                banner.textContent = '信号总数不变，当前参数与预览参数产生的信号一致';
            } else {
                banner.className = 'diff-banner changed';
                var parts = [];
                if (buyDiff !== 0) parts.push('买入 ' + (buyDiff > 0 ? '+' : '') + buyDiff);
                if (sellDiff !== 0) parts.push('卖出 ' + (sellDiff > 0 ? '+' : '') + sellDiff);
                banner.textContent = '信号变化：' + parts.join('，') + '（预览 vs 当前）';
            }
        }

        function updateComparison() {
            if (signalsData && signalsData.meta) {
                document.getElementById('comp-current-buy').textContent = signalsData.meta.buy_count;
                document.getElementById('comp-current-sell').textContent = signalsData.meta.sell_count;
            }
            document.getElementById('comp-preview-buy').textContent = '-';
            document.getElementById('comp-preview-sell').textContent = '-';
            document.getElementById('diff-banner').style.display = 'none';
        }

        async function applyParams() {
            var params = getSliderParams();
            var btn = document.getElementById('apply-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 重算中...';
            try {
                var resp = await fetch('/api/params', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
                var result = await resp.json();
                if (result.success) {
                    pollTimer = setInterval(autoRefresh, 3000);
                } else {
                    alert('参数应用失败: ' + (result.error || '未知错误'));
                    btn.disabled = false;
                    btn.textContent = '应用参数';
                }
            } catch (e) {
                alert('请求失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '应用参数';
            }
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('modal-overlay')) return;
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.target.classList.add('active');
            if (tabId === 'params') {
                loadParams();
                if (signalsData) updateComparison();
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            try {
                const resp = await fetch('/api/refresh', { method: 'POST' });
                const result = await resp.json();
                if (result.success) {
                    await loadAll();
                    if (document.getElementById('tab-params').classList.contains('active')) {
                        loadParams();
                    }
                } else {
                    alert('刷新失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                alert('刷新失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }

        // 页面加载
        initStrategySelect();
        loadAll();
    </script>
</body>
</html>
